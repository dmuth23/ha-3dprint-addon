name: Track BambuBuddy daily image

# maziggy publishes a single FLOATING tag, ghcr.io/maziggy/bambuddy:daily, that he
# repoints at each new daily build (he stopped cutting per-date image tags in March
# 2026, so the digest is the only stable handle on a specific build).
#
# This workflow pins that image's multi-arch INDEX DIGEST in bambuddy-daily/Dockerfile.
# Pinning by digest is what makes the pipeline actually work:
#   * A new upstream build => a new digest => a Dockerfile change => the HA add-on
#     rebuild is cache-busted and is GUARANTEED to pull the new app code. We no longer
#     depend on whether Supervisor force-pulls a floating tag.
#   * We also bump the human-readable version in config.yaml so HA surfaces an
#     "update available". The version is only a label; the digest is the source of truth.
#
# Runs at 14:00 UTC daily — a couple of hours after maziggy's ~13:30-UTC daily push.
# Also triggerable manually from the Actions tab (workflow_dispatch).
on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:

concurrency:
  group: track-bambuddy-daily
  cancel-in-progress: false

env:
  UPSTREAM_REPO: maziggy/bambuddy
  ADDON_DIR: bambuddy-daily

jobs:
  track:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Resolve upstream :daily index digest
        id: upstream
        run: |
          set -euo pipefail
          TOKEN=$(curl -s "https://ghcr.io/token?scope=repository:${UPSTREAM_REPO}:pull" \
            | python3 -c "import sys,json;print(json.load(sys.stdin)['token'])")
          # Send index/manifest-list accept types so the registry returns the
          # MULTI-ARCH index digest (arch-safe to pin), not a per-arch one.
          DIGEST=$(curl -sI \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Accept: application/vnd.oci.image.index.v1+json" \
            -H "Accept: application/vnd.docker.distribution.manifest.list.v2+json" \
            "https://ghcr.io/v2/${UPSTREAM_REPO}/manifests/daily" \
            | grep -i '^docker-content-digest:' | awk '{print $2}' | tr -d '\r')
          if [ -z "${DIGEST}" ]; then
            echo "::error::Could not resolve ghcr.io/${UPSTREAM_REPO}:daily digest"
            exit 1
          fi
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "Upstream :daily = ${DIGEST}"

      - name: Read currently pinned digest from Dockerfile
        id: current
        run: |
          set -euo pipefail
          PINNED=$( { grep -oE 'ghcr\.io/maziggy/bambuddy:daily@sha256:[0-9a-f]{64}' \
            "${ADDON_DIR}/Dockerfile" || true; } | head -1 | sed 's/.*@//')
          echo "digest=${PINNED}" >> "$GITHUB_OUTPUT"
          echo "Pinned   :daily = ${PINNED:-<none>}"

      - name: Up to date — nothing to do
        if: steps.upstream.outputs.digest == steps.current.outputs.digest
        run: echo "Already pinned to the latest :daily (${{ steps.current.outputs.digest }})."

      - name: Resolve human-readable version label
        id: label
        if: steps.upstream.outputs.digest != steps.current.outputs.digest
        run: |
          set -euo pipefail
          # Prefer maziggy's latest 'daily' GitHub release tag for the label...
          REL=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${UPSTREAM_REPO}/releases" \
            | python3 -c "
          import sys, json
          rs = json.load(sys.stdin)
          daily = [r for r in rs if 'daily' in r.get('tag_name','')]
          print(daily[0]['tag_name'].lstrip('v') if daily else '', end='')
          ")
          CUR=$(grep '^version:' "${ADDON_DIR}/config.yaml" | sed 's/version: *"\(.*\)"/\1/')
          if [ -n "${REL}" ] && [ "${REL}" != "${CUR}" ]; then
            VER="${REL}"
          else
            # ...but the digest, not the release, is the trigger. If the image moved
            # without a new (or differently-named) release, keep the base version and
            # restamp with today's UTC date so HA still sees a new version. Append a
            # short digest id if even that collides with the current label.
            BASE="${CUR%-daily.*}"
            VER="${BASE}-daily.$(date -u +%Y%m%d)"
            if [ "${VER}" = "${CUR}" ]; then
              SHORT=$(echo "${{ steps.upstream.outputs.digest }}" | sed 's/sha256://' | cut -c1-7)
              VER="${VER}.${SHORT}"
            fi
          fi
          echo "version=${VER}" >> "$GITHUB_OUTPUT"
          echo "New version label = ${VER}"

      - name: Pin new digest + bump version, commit & push
        if: steps.upstream.outputs.digest != steps.current.outputs.digest
        run: |
          set -euo pipefail
          NEWD="${{ steps.upstream.outputs.digest }}"
          OLDD="${{ steps.current.outputs.digest }}"
          VER="${{ steps.label.outputs.version }}"

          # 1. Repoint the Dockerfile builder stage to the new digest (the real change).
          sed -i -E "s#(ghcr\.io/maziggy/bambuddy:daily@)sha256:[0-9a-f]{64}#\1${NEWD}#" \
            "${ADDON_DIR}/Dockerfile"
          # 2. Bump the add-on version so HA surfaces the update.
          OLDV=$(grep '^version:' "${ADDON_DIR}/config.yaml" | sed 's/version: *"\(.*\)"/\1/')
          sed -i "s/^version: \".*\"/version: \"${VER}\"/" "${ADDON_DIR}/config.yaml"

          echo "Dockerfile : ${OLDD:-<none>} -> ${NEWD}"
          echo "config.yaml: ${OLDV} -> ${VER}"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${ADDON_DIR}/Dockerfile" "${ADDON_DIR}/config.yaml"
          git commit -m "chore: track maziggy bambuddy:daily ${NEWD:7:12} (v${VER})"
          # Rebase onto whatever landed on main since checkout (e.g. a manual commit)
          # before pushing, so a moved remote can't reject this push.
          git pull --rebase origin main
          git push
